<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线图片压缩 | Free Image Compressor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <button onclick="setLang('zh')">中文</button>
            <button onclick="setLang('en')">English</button>
        </div>
        <h1 id="title">在线图片压缩工具</h1>

        <div class="upload-box" id="uploadBox">
            <p id="uploadText">点击或拖拽图片到此处上传</p>
            <p style="color:#888;font-size:14px;margin-top:8px">JPG / PNG / WebP 通用</p>
        </div>
        <input type="file" id="fileInput" accept="image/*">

        <div class="quality-wrap">
            <label id="qualityLabel">压缩质量：80%</label>
            <input type="range" id="quality" min="10" max="100" value="80">
        </div>

        <div class="info-row">
            <span id="originText">原图大小：-</span>
            <span id="compressText">压缩后：-</span>
        </div>
        <div class="info-row">
            <span id="saveText">节省空间：-</span>
            <span id="rateText">压缩率：-</span>
        </div>

        <button class="btn" id="downloadBtn" disabled>下载压缩图片</button>

        <div class="preview">
            <div>
                <p id="originImgText">原图预览</p>
                <img id="originImg">
            </div>
            <div>
                <p id="compressImgText">压缩预览</p>
                <img id="compressImg">
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
